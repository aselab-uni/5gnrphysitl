name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.10"

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package and dev dependencies
        run: python -m pip install .[dev]

      - name: Run unit tests
        run: python -m pytest

      - name: Compile key modules
        run: python -m compileall main.py run_experiments.py run_showcases.py run_student_testcases.py gui phy channel experiments utils fivegnr_phy_stl

      - name: CLI smoke test
        run: |
          python -m fivegnr_phy_stl --help
          fivegnr-phy-stl-experiments --help
          fivegnr-phy-stl-showcases --help
          fivegnr-phy-stl-student-cases --help

      - name: Build wheel and sdist
        run: python -m build

      - name: Build container image
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: docker build -t fivegnr-phy-stl-ci .

      - name: Upload build artifacts
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/*
